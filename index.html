<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OM PNG PRO</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h1>OM PNG PRO</h1>

<input
id="search"
type="text"
placeholder="Search PNG..."
>

</header>

<section class="upload">

<form
action="/upload"
method="POST"
enctype="multipart/form-data"
>

<input
type="file"
name="png"
accept=".png"
required
>

<button>
Upload PNG
</button>

</form>

</section>

<section id="gallery">

</section>

<script src="script.js"></script>

</body>
</html>
